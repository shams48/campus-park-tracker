<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Campus Park Tracker - Admin</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="hero">
    <h1>Admin Dashboard</h1>
    <p class="subtitle">Event log and manual correction</p>
    <p><a class="link" href="/">Back to driver dashboard</a></p>
  </header>

  <main>
    <section class="summary" id="summary"></section>

    <section class="panel">
      <div class="panel-head">
        <h2>Recent events</h2>
        <p id="last-update" class="muted">Loading...</p>
      </div>
      <div class="table-wrap">
        <table id="events-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Lot</th>
              <th>Type</th>
              <th>Time (UTC)</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <p class="muted small">
        Deleting an event removes it from the audit log and recomputes occupancy.
        Use this only to fix wrong manual entries (Risk #2 in the mitigation plan).
      </p>
    </section>
  </main>

  <script src="/static/admin.js"></script>
</body>
</html>
